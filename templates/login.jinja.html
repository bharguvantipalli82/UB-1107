<!-- VS Code: HTML + Jinja -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Soft pastel gradient background */
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #a8e6cf, #dcedc1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #a8e6cf;
            color: #333;
            font-size: 16px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #8dd3b2;
        }
        
        .warning {
            color: red;
            margin-top: 10px;
        }
        
        hr {
            margin: 20px 0;
            border: 0.5px solid #ddd;
        }
        
        .login-hint {
            font-size: 13px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">
            <h2>Welcome to <br> HealthCare Portal</h2>
            <p class="login-subtitle">
                Login to access your health condition checker
            </p>

            <form method="POST">
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>
            </form>

            <p class="warning">{{ error }}</p>

            <hr>

            <p class="login-hint">
                New to HealthCare Portal?<br>
                <a href="{{ url_for('register') }}" style="color: #1e8449; text-decoration: none;">Create an account</a>
            </p>
            
            <hr>
            
            <button onclick="window.location.href='{{ url_for('google_signin') }}'" style="background-color: #4285f4; color: white;">
                Sign in with Google
            </button>
        </div>

    </div>

</body>

</html>
