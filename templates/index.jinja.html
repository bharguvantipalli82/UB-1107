<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #a8e6cf, #dcedc1);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        
        .form-card h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .form-card input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        
        .form-card button {
            width: 85%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background-color: #1e8449;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        .form-card button:hover {
            background-color: #145a32;
        }
    </style>
</head>

<body>
    <div class="form-card">
        <h2>Health Condition Checker</h2>
        <form method="POST">
            <input type="number" step="0.1" name="fever" placeholder="Body Temperature (°C)" required>
            <input type="number" name="bp" placeholder="Blood Pressure (mmHg)" required>
            <input type="number" name="sugar" placeholder="Sugar Level (mg/dL)" required>
            <input type="number" name="heart_rate" placeholder="Heart Rate (bpm)" required>
            <input type="number" name="oxygen" placeholder="Oxygen Saturation (%)" required>
            <button type="submit">Analyze Health</button>
        </form>
    </div>
</body>

</html>
